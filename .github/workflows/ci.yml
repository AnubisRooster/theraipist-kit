name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  umbrella:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      # Some modules are iOS-only (VoiceLoopKit depends on Speech/AVAudioSession,
      # which don't exist on macOS), so build/test against an iOS Simulator
      # destination rather than plain `swift build`/`swift test` (which target
      # the host macOS platform by default and fail on iOS-only APIs).
      #
      # Per-product schemes only carry a build action, not a test action, so
      # tests run through the package's aggregate scheme instead (confirmed
      # via `xcodebuild -list`: <product names>, therAIpist-kit-Package).
      - name: Test umbrella package (all 8 modules)
        run: >
          xcodebuild test -scheme therAIpist-kit-Package
          -destination 'platform=iOS Simulator,name=iPhone 15'

  # Each module also lives as its own standalone package under Packages/<Name>/,
  # with only its own dependencies declared. These jobs prove that standalone
  # story actually works — e.g. that PINLockKit really builds/tests without ever
  # touching LLM.swift, and that LocalLLMKit's local path dependency on
  # ../BYOKLLMKit resolves correctly outside the umbrella manifest.
  #
  # fail-fast: false so one module's failure doesn't hide the others' results.
  subpackage-native:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        module: [BYOKLLMKit, PINLockKit, ContentSafetyKit, GraphKit, AgentRouteKit]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Build and test ${{ matrix.module }} standalone
        working-directory: Packages/${{ matrix.module }}
        run: swift build && swift test

  subpackage-ios:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        module: [VoiceLoopKit, GraphViewKit, LocalLLMKit]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      # A standalone single-product package doesn't necessarily get a
      # "<Name>-Package" aggregate scheme the way the multi-product umbrella
      # does (confirmed: GraphViewKit's workspace has no such scheme) — list
      # first so a wrong guess here is diagnosable without another round trip.
      - name: List schemes
        working-directory: Packages/${{ matrix.module }}
        run: xcodebuild -list
      - name: Build and test ${{ matrix.module }} standalone
        working-directory: Packages/${{ matrix.module }}
        run: >
          xcodebuild test -scheme ${{ matrix.module }}
          -destination 'platform=iOS Simulator,name=iPhone 15'
