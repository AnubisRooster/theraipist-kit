name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      # Both targets are iOS-only (VoiceLoopKit depends on Speech/AVAudioSession,
      # which don't exist on macOS), so build/test against an iOS Simulator
      # destination rather than plain `swift build`/`swift test` (which target
      # the host macOS platform by default and fail on iOS-only APIs).
      - name: Test BYOKLLMKit
        run: >
          xcodebuild test -scheme BYOKLLMKit
          -destination 'platform=iOS Simulator,name=iPhone 15'
      - name: Test VoiceLoopKit
        run: >
          xcodebuild test -scheme VoiceLoopKit
          -destination 'platform=iOS Simulator,name=iPhone 15'
